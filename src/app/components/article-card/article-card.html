<article class="card" [class.card--featured]="featured">
  <div class="card-image">
    <img [src]="article.imageUrl" [alt]="article.title" loading="lazy" />
    <span class="card-category" [attr.data-cat]="getCategoryClass(article.category)">
      {{ article.category }}
    </span>
    @if (featured) {
      <span class="card-featured-badge">Featured</span>
    }
  </div>

  <div class="card-body">
    <h2 class="card-title">{{ article.title }}</h2>
    <p class="card-excerpt">{{ article.excerpt }}</p>

    <div class="card-footer">
      <div class="card-author">
        <div class="author-avatar">{{ article.authorAvatar }}</div>
        <div class="author-info">
          <span class="author-name">{{ article.author }}</span>
          <span class="article-date">{{ article.date | date: 'MMM d, yyyy' }}</span>
        </div>
      </div>
      <div class="read-time">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
        {{ article.readTime }} min read
      </div>
    </div>
  </div>
</article>
